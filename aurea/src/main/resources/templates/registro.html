<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurea - Crear cuenta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/login.css">
</head>
<body>

<div class="auth-page">

    <!-- lado izquierdo — imagen editorial -->
    <div class="auth-img">
        <img class="auth-img__bg" src="/imgs/login-bg.jpg" alt="Aurea moda masculina">
        <div class="auth-img__content">
            <a href="/" class="auth-img__logo">
                Au<span>rea</span>
            </a>
            <div class="auth-img__text">
                <h2 class="auth-img__title">Tu estilo,<br><em>tu cuenta</em></h2>
                <p class="auth-img__sub">Accede a tu historial de pedidos, guarda tus favoritos y disfruta de ofertas exclusivas para miembros.</p>
            </div>
        </div>
    </div>

    <!-- lado derecho — formulario -->
    <div class="auth-form-side">
        <div class="auth-form-wrap">

            <!-- Panel registro -->
            <div class="auth-panel active" id="panel-registro">
                <h1 class="auth-title">Crea tu cuenta</h1>
                <p class="auth-sub">Completa tus datos para registrarte.</p>

                <form action="/registro" method="post">
                    <div class="form-group">
                        <label for="reg-nombre">Nombre completo</label>
                        <input type="text" id="reg-nombre" name="nombre" placeholder="Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Correo electrónico</label>
                        <input type="email" id="reg-email" name="correo" placeholder="tu@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-telefono">Teléfono</label>
                        <input type="tel" id="reg-telefono" name="telefono" placeholder="6441234567">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reg-password">Contraseña</label>
                            <input type="password" id="reg-password" name="contrasena" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-confirm">Confirmar</label>
                            <input type="password" id="reg-confirm" name="confirmar" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Crear cuenta</button>
                </form>

                <p class="auth-terms">
                    Al registrarte aceptas nuestros
                    <a href="#">Términos de uso</a> y
                    <a href="#">Política de privacidad</a>.
                </p>

                <div class="auth-switch">
                    ¿Ya tienes cuenta?
                    <a href="/login">Inicia sesión</a>
                </div>
            </div>

        </div>
    </div>

</div>


</body>
</html>
